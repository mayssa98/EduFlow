server:
  port: ${APP_BACKEND_PORT:8081}
  servlet:
    context-path: /api
  forward-headers-strategy: framework

spring:
  config:
    import: optional:file:.env.properties
  application:
    name: eduflow-backend
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:eduflow}?sslmode=disable
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:eduflow2026}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 250MB
      max-request-size: 260MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

eduflow:
  jwt:
    access-secret: ${JWT_SECRET:eduflow-local-jwt-access-secret-key-min32bytes}
    refresh-secret: ${JWT_REFRESH_SECRET:eduflow-local-jwt-refresh-secret-key-min32bytes}
    access-expiry-minutes: ${JWT_ACCESS_EXPIRY_MIN:60}
    refresh-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:7}
  cors:
    allowed-origin: ${APP_FRONTEND_ORIGIN:http://localhost:4200}
  otp:
    expiry-minutes: ${OTP_EXPIRY_MIN:3}
    max-attempts: 5
  login:
    max-attempts: ${LOGIN_MAX_ATTEMPTS:5}
  admin:
    default-email: ${ADMIN_DEFAULT_EMAIL:admin@eduflow.com}
    default-password: ${ADMIN_DEFAULT_PASSWORD:Admin@EduFlow2026}
  email:
    resend-api-key: ${RESEND_API_KEY:}
    from-address: ${EMAIL_FROM:onboarding@resend.dev}
    from-name: EduFlow
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:4200/auth/google/callback}
  cookie:
    secure: ${COOKIE_SECURE:false}
    same-site: ${COOKIE_SAME_SITE:Lax}
  upload:
    dir: ${UPLOAD_DIR:./uploads}
    pdf-max-bytes: 26214400      # 25 MB
    mp4-max-bytes: 262144000     # 250 MB
  ai:
    gemini-api-key: ${GEMINI_API_KEY:}
    gemini-model: ${GEMINI_MODEL:gemini-1.5-flash}
    timeout-seconds: 30
    fallback-threshold: 10.0     # moyenne < 10 → ELEVE in heuristic

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.eduflow: DEBUG
    org.springframework.security: INFO
