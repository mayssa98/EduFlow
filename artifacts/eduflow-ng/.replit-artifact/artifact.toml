kind = "web"
  previewPath = "/eduflow/"
  title = "EduFlow Angular"
  version = "1.0.0"
  id = "artifacts/eduflow-ng"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/eduflow/" ]
  localPort = 21536

  [services.development]
  run = "pnpm --filter @workspace/eduflow-ng run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/eduflow-ng", "run", "build" ]
  publicDir = "artifacts/eduflow-ng/dist/eduflow-ng/browser"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "21536"
  NG_CLI_ANALYTICS = "false"
  